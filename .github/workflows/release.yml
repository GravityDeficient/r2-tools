name: release

on:
  push:
    branches: [main]
    tags:
      - 'sync-v*'
      # - 'indexer-v*'   # enable when r2-indexer ships

env:
  SIZE_CAP_BYTES: 209715200  # 200 MiB per NFR1

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: sync
            image: ghcr.io/gravitydeficient/r2-sync
            tag_prefix: sync-
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: compute image tags
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=match,pattern=${{ matrix.tag_prefix }}v(\d+\.\d+\.\d+),group=1,prefix=v
            type=match,pattern=${{ matrix.tag_prefix }}v(\d+\.\d+)\.\d+,group=1,prefix=v
            type=match,pattern=${{ matrix.tag_prefix }}v(\d+)\.\d+\.\d+,group=1,prefix=v

      - name: build (load amd64 for size + smoke checks)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.tool }}
          platforms: linux/amd64
          load: true
          tags: ${{ matrix.image }}:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: image size check
        run: |
          SIZE=$(docker image inspect ${{ matrix.image }}:ci-check --format '{{.Size}}')
          SIZE_MB=$((SIZE/1024/1024))
          echo "amd64 image size: ${SIZE_MB} MiB (${SIZE} bytes)"
          if [ "$SIZE" -gt "$SIZE_CAP_BYTES" ]; then
            echo "ERROR: image size exceeds NFR1 cap of 200 MiB"
            exit 1
          fi

      - name: rclone smoke test (amd64)
        run: docker run --rm --entrypoint rclone ${{ matrix.image }}:ci-check --version

      - name: python import smoke test (amd64)
        run: docker run --rm --entrypoint python ${{ matrix.image }}:ci-check -c "import r2_sync"

      - name: build + push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.tool }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
