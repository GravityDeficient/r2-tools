name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: sync
            import_name: r2_sync
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ matrix.tool }}/requirements-dev.txt

      - name: install dev deps
        run: pip install -r ${{ matrix.tool }}/requirements-dev.txt

      - name: pytest
        working-directory: ${{ matrix.tool }}
        run: pytest tests/ -v

      - name: build image
        run: docker build -t r2-tools-${{ matrix.tool }}:ci ${{ matrix.tool }}/

      - name: image import smoke test
        run: docker run --rm --entrypoint python r2-tools-${{ matrix.tool }}:ci -c "import ${{ matrix.import_name }}"

      - name: rclone smoke test
        run: docker run --rm --entrypoint rclone r2-tools-${{ matrix.tool }}:ci --version
