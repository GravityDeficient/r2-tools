# Credentials Secret.
#
# DO NOT commit real values. In practice, manage this via your secrets
# workflow (SOPS, Sealed Secrets, External Secrets, etc.). This file is
# only a shape reference.
apiVersion: v1
kind: Secret
metadata:
  name: r2-credentials
  namespace: r2-sync
type: Opaque
stringData:
  R2_ACCESS_KEY_ID: "your-access-key-id"
  R2_SECRET_ACCESS_KEY: "your-secret-access-key"
  R2_ENDPOINT: "https://your-account-id.r2.cloudflarestorage.com"
